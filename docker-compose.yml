services:
  # PostgreSQL database for local development
  postgres:
    image: postgres:16-alpine
    container_name: dockydoc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dockydoc
      POSTGRES_PASSWORD: dockydoc_secret
      POSTGRES_DB: dockydoc_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dockydoc -d dockydoc_dev']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for session/cache (prepared for future use)
  redis:
    image: redis:7-alpine
    container_name: dockydoc_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
